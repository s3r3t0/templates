name: Awesome Bot

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ruby/setup-ruby@94e4d89d3e6c1c7599e0210d114c5ffb23f1a866 # v1.304.0
      with:
        ruby-version: '2.7'
        
    - name: Install Awesome Bot
      run: gem install awesome_bot
      
    - name: Verify links
      run: awesome_bot README.md --skip-save-results --allow-redirect -a 429 -w raw.githubusercontent.com
